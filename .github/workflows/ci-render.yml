name: Node.js CI/CD a Render

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          MONGO_URL: mongodb://localhost:27017/test_db

      - name: Calcular cobertura
        run: npm run test:coverage
        env:
          MONGO_URL: mongodb://localhost:27017/test_db

      - name: Guardar informe de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Construir imagen Docker
        run: docker build -t ud06-opt-api .

      - name: Disparar despliegue en Render
        if: success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not configured"
            exit 1
          fi

          curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"
